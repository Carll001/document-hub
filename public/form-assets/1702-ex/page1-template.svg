<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 936" role="img" aria-labelledby="title desc">
  <title id="title">BIR Form 1702 Page 1 Template</title>
  <desc id="desc">Placeholder page 1 background for the 1702-EX overlay preview.</desc>
  <defs>
